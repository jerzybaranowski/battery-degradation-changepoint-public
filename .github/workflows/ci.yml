name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-validate:
    name: Test and validate (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
      PYTHONHASHSEED: "0"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Regenerate and validate publication assets
        run: make publication-assets

      - name: Run tests
        run: python -m pytest -p no:cacheprovider
