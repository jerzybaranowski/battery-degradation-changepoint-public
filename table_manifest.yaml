    generator: battery_degradation_publication.tables.generation.computation_gates
    rounding: R-hat uses 3 or 6 decimals; ESS uses 0 or 2 decimals; E-BFMI uses 4 decimals.
    caveat: H5.1 ESS values use predefined key parameters; maximum rank R-hat uses all exported posterior coordinates.
