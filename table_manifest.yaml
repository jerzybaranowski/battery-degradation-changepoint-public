    rounding: Cycle quantities use 3 decimals; slopes and residual scale use 6 decimals.
    caveat: Population transition and slope summaries are draw-wise means of battery-specific quantities.
    validation_status: exact-latex-match
  - table_id: truncation_results
    caption: Sensitivity of transition localization and extrapolative prediction to battery-wise trajectory truncation.
    manuscript_source_file: docs/latex paper/tables/truncation_results.tex
    generated_latex: tables/generated/truncation_results.tex
    machine_readable: tables/machine_readable/truncation_results.csv
    table_class: computed
    source_artifacts:
      - data/frozen_results/m8/truncation_summary.csv
      - data/frozen_results/m8/computational_diagnostics.csv
    accepted_run: m8_extended_sensitivity_01
    generator: battery_degradation_publication.tables.generation.truncation_results
    rounding: Midpoint shifts use 1 decimal; coverage, rank correlation, and RMSE use 3 decimals.
    caveat: A1 at 70 percent retention has a dagger and is diagnostic-only because of one tree-depth saturation.
    validation_status: exact-latex-match
